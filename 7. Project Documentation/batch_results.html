<!DOCTYPE html>
<html>
<head>
    <title>Batch Screening Results</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #f4f6f8; }
        h1 { text-align: center; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #2980b9; color: white; }
        .approved { color: #27ae60; font-weight: bold; }
        .rejected { color: #c0392b; font-weight: bold; }
        a { display: inline-block; margin-top: 20px; color: #2980b9; }
    </style>
</head>
<body>
    <h1>Batch Screening Results</h1>
    <table>
        <tr>
            <th>Applicant ID</th>
            <th>Result</th>
            <th>Risk Score</th>
        </tr>
        {% for r in results %}
        <tr>
            <td>{{ r.applicant_id }}</td>
            <td class="{{ 'rejected' if 'REJECTED' in r.result else 'approved' }}">{{ r.result }}</td>
            <td>{{ r.risk_score }}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="/batch">&larr; Upload Another File</a>
</body>
</html>
